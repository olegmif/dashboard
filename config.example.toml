# Dashboard configuration. Copy to config.toml and adjust.
# config.toml is gitignored (it will later hold secrets like Telegram api keys).
#
# Each [[widget]] is one desktop window on the left monitor:
#   type     — widget kind: clock | photo | telegram | weather | sysicons
#   instance — per-window id (WM_CLASS instance + window title); optional
#   x, y     — top-left position in root-space pixels (left monitor starts at x=0)
#   width,height — window size
#
# Move a widget (even to another monitor) by changing its coordinates.
#
# Per-widget settings go in an [widget.options] subtable; each widget type reads
# its own keys (consumed starting M2.Ph2 for clock, M2.Ph3 for photo). A widget
# with no options uses its defaults.

[[widget]]
type = "clock"
instance = "clock"
x = 40
y = 40
width = 300
height = 120
# [widget.options]
# format = "15:04:05"   # (example; clock reads options starting M2.Ph2)

[[widget]]
type = "photo"
instance = "photo"
x = 40
y = 180
width = 420
height = 300
[widget.options]
dirs = ["/home/you/Pictures"]   # one or more directories with images
# recursive = false             # descend into subdirectories

[[widget]]
type = "weather"
instance = "weather"
x = 40
y = 500
width = 300
height = 150

[[widget]]
type = "sysicons"
instance = "sysicons"
x = 40
y = 670
width = 420
height = 80

[[widget]]
type = "telegram"
instance = "telegram-main"
x = 40
y = 770
width = 420
height = 260
